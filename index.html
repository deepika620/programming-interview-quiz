<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Programming Interview Quiz</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

<h1>Programming Interview Quiz</h1>

<!-- LANGUAGE SELECTION -->

<div id="categoryBox">

<h2>Select Language</h2>

<button onclick="chooseLevel('python')">Python</button>
<button onclick="chooseLevel('c')">C Programming</button>
<button onclick="chooseLevel('java')">Java</button>
<button onclick="chooseLevel('web')">Web Development</button>
<button onclick="chooseLevel('mysql')">MySQL</button>

</div>


<!-- LEVEL SELECTION -->

<div id="levelBox" class="hide">

<h2>Select Difficulty</h2>

<button onclick="startQuiz('easy')">Easy</button>
<button onclick="startQuiz('intermediate')">Intermediate</button>
<button onclick="startQuiz('advanced')">Advanced</button>

</div>


<!-- QUIZ -->

<div id="quizBox" class="hide">

<div class="top">

<span id="timer">Time: 15</span>

<div class="progress">
<div id="progressBar"></div>
</div>

</div>

<h2 id="question"></h2>

<div id="options"></div>

</div>


<!-- RESULT -->

<div id="resultBox" class="hide">

<h2>Quiz Completed</h2>

<h1 id="score"></h1>

<input id="playerName" placeholder="Enter your name">

<button onclick="saveScore()">Save Score</button>

<h2>Leaderboard</h2>

<ul id="leaderboard"></ul>

<h2>Correct Answers</h2>

<div id="answers"></div>

<button onclick="location.reload()">Restart Quiz</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
